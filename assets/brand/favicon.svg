<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Macro Evidence">
  <style>
    .bg { fill: #18181b; }
    .bars { fill: #e4e4e7; }
    .accent { fill: #ea580c; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fafafa; }
      .bars { fill: #3f3f46; }
      .accent { fill: #c2410c; }
    }
  </style>
  <!-- Three normalized signals + accent — reads at 16px; wordmark stays CSS/HTML on pages -->
  <rect class="bg" width="32" height="32" rx="8"/>
  <rect class="bars" x="7" y="17" width="3.5" height="9" rx="0.75"/>
  <rect class="bars" x="14.25" y="11" width="3.5" height="15" rx="0.75"/>
  <rect class="bars" x="21.5" y="14" width="3.5" height="12" rx="0.75"/>
  <rect class="accent" x="5" y="27" width="22" height="2.25" rx="1.125" opacity="0.95"/>
</svg>
